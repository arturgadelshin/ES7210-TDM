substitutions:
  name: "gg-voice-tdm-test"
  friendly_name: "gg-voice-tdm-test"

esphome:
  name: ${name}
  min_version: 2023.11.0
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32s3box
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_ESP32S3_BOX_BOARD: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: VERBOSE
  baud_rate: 115200

api:
  encryption:
    key: "S9nKbvnPI9wE03COo3LLF3Tx9VOkjhMIwOs44cky4i4="
  reboot_timeout: 3min

ota:
  - platform: esphome

ethernet:
  type: W5500
  clk_pin: GPIO13
  mosi_pin: GPIO11
  miso_pin: GPIO12
  cs_pin: GPIO14
  interrupt_pin: GPIO10
  reset_pin: GPIO9
  clock_speed: 14Mhz

i2c:
  id: bus_i2c
  sda: GPIO8
  scl: GPIO18
  scan: true
  frequency: 100kHz

es7210_tdm:
  id: es7210_adc
  i2c_id: bus_i2c
  bits_per_sample: 16bit
  sample_rate: 16000
  mic_gain: "24db"

i2s_tdm_audio:
  - id: tdm_mic_bus
    i2s_lrclk_pin: GPIO45
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

microphone:
  - platform: i2s_tdm_audio
    id: tdm_mic
    i2s_tdm_audio_id: tdm_mic_bus
    i2s_din_pin: GPIO16
    sample_rate: 16000
    bits_per_sample: 32bit
    correct_dc_offset: false

interval:
  - interval: 5s
    then:
      - lambda: |-
          id(tdm_mic).start();
          ESP_LOGI("test", "Mic started, waiting for TDM data...");
